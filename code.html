<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Code &mdash; Joshua Gustaveson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Hanken+Grotesk:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="dark-mode.js"></script>
<style>
body{background:var(--bg);color:var(--fg);font-family:var(--body);font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased}

.page-header{padding:clamp(48px,8vh,90px) clamp(20px,5vw,72px) clamp(28px,4vh,48px);border-bottom:1px solid var(--line)}
.ph-idx{font-family:var(--mono);font-size:.78rem;letter-spacing:.12em;color:var(--accent-ink);display:block;margin-bottom:14px}
.page-header h1{font-family:var(--disp);font-weight:440;font-size:clamp(2.6rem,7vw,5.2rem);line-height:.9;letter-spacing:-.03em;font-variation-settings:"opsz" 64}
.page-header h1 em{font-style:italic;color:var(--accent-ink)}
.page-header p{font-family:var(--body);font-size:1.05rem;color:var(--dim);margin-top:20px;max-width:560px;line-height:1.7}

.projects{padding:0 clamp(20px,5vw,72px) 100px}

/* project row */
.project{border-bottom:1px solid var(--line);padding:0;overflow:hidden}
.project-head{display:grid;grid-template-columns:3.5rem 1fr auto;align-items:start;gap:20px;
  padding:28px 0;cursor:pointer;transition:background .2s}
.project-head:hover .proj-title{color:var(--accent-ink)}
.proj-num{font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;color:var(--dimmer);padding-top:4px}
.proj-title{font-family:var(--disp);font-weight:500;font-size:clamp(1.15rem,2.4vw,1.6rem);letter-spacing:-.02em;
  font-variation-settings:"opsz" 36;transition:color .2s}
.proj-subtitle{font-family:var(--mono);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--dimmer);margin-top:6px}
.proj-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag{font-family:var(--mono);font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;
  border:1px solid var(--line-strong);padding:4px 9px;color:var(--dim)}
.proj-arrow{font-family:var(--mono);font-size:.8rem;color:var(--dimmer);padding-top:4px;
  transition:transform .3s,color .2s}
.project.open .proj-arrow{transform:rotate(90deg);color:var(--accent-ink)}

/* expand panel */
.project-body{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.2,.7,.3,1)}
.project.open .project-body{max-height:600px}
.project-detail{padding:0 0 32px 3.5rem;display:grid;grid-template-columns:1fr 240px;gap:32px}
.detail-desc{font-size:1rem;line-height:1.75;color:var(--dim)}
.detail-desc strong{color:var(--fg)}
.detail-meta{font-family:var(--mono);font-size:.7rem;letter-spacing:.08em;color:var(--dim)}
.detail-meta dt{color:var(--dimmer);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;margin-top:14px;margin-bottom:3px}
.detail-meta dt:first-child{margin-top:0}
.detail-meta dd{color:var(--fg)}
.detail-links{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}
.dlink{font-family:var(--mono);font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;
  border:1px solid var(--line-strong);padding:8px 14px;color:var(--accent-ink);transition:all .2s}
.dlink:hover{background:var(--accent-ink);color:var(--bg);border-color:var(--accent-ink)}
@media(max-width:640px){
  .project-detail{grid-template-columns:1fr}
  .project-head{grid-template-columns:2.5rem 1fr auto}
}
</style>
</head>
<body class="noise">

<div class="status">
  <a href="index.html" class="sig">Joshua Gustaveson</a>
  <nav>
    <a href="code.html" class="active">Code</a>
    <a href="games/index.html">Games</a>
    <a href="gallery.html">Photography</a>
    <a href="colormap.html">Color Space</a>
  </nav>
  <span id="clock">--:-- EST</span>
</div>

<div class="page-header">
  <span class="ph-idx">01 / Code</span>
  <h1>Coding <em>projects</em></h1>
  <p>Systems, ML, full-stack, and mobile. Most started as coursework or side projects and grew from there. Click any row to expand.</p>
</div>

<div class="projects" id="projects"></div>

<script>
const PROJECTS = [
  {
    num: '001',
    title: 'Operating Systems Projects',
    subtitle: 'Systems Programming · C++',
    tags: ['C++', 'Concurrency', 'Threading', 'Networking', 'OS'],
    desc: 'Two systems projects from EECS 482. <strong>Thread library:</strong> user-level cooperative scheduler with mutexes and condition variables, supporting multi-processor synchronization via context switching. <strong>Network file server:</strong> multi-threaded server using hand-over-hand locking to enforce disk consistency under concurrent client requests, no deadlocks, no TOCTOU races.',
    role: 'Solo — EECS 482 Operating Systems, University of Michigan',
    stack: 'C++17, POSIX threads, TCP sockets',
    year: '2026',
    links: [],
  },
  {
    num: '002',
    title: 'Client-Side Web Application',
    subtitle: 'Full-Stack · React · Flask',
    tags: ['React', 'JavaScript', 'Python', 'Flask', 'REST API', 'Cypress'],
    desc: 'Full-stack platform with a <strong>React frontend</strong> and a Flask REST API. Async fetch keeps all interactions reload-free. Client-side state managed with React Hooks throughout. Feature coverage validated with Cypress end-to-end tests.',
    role: 'Solo project',
    stack: 'React, JavaScript, Python, Flask, Cypress',
    year: '2026',
    links: [],
  },
  {
    num: '003',
    title: 'Multi-Object Tracking Benchmark',
    subtitle: 'Computer Vision · Python',
    tags: ['Python', 'YOLO', 'DeepSORT', 'ByteTrack', 'MeMOT', 'OC-SORT', 'StrongSORT'],
    desc: 'Systematic benchmark of five tracking algorithms — <strong>DeepSORT, ByteTrack, MeMOT, OC-SORT, and StrongSORT</strong> — evaluated against a shared custom-trained YOLO model on real robotics data. Designed to isolate the contribution of appearance embeddings versus IoU-only association under real-world conditions.',
    role: 'Team project — Michigan Task-Based Robotics Project Team',
    stack: 'Python, PyTorch, OpenCV, ONNXRuntime',
    year: '2025',
    links: [],
  },
  {
    num: '004',
    title: 'AI Mental Health App',
    subtitle: 'Mobile · Swift · C++',
    tags: ['Swift', 'C++', 'OpenAI API', 'iOS', 'Scrum'],
    desc: 'iOS mental health support app built in Swift with a Scrum workflow. <strong>Migrated AI from OpenAI API to a locally-hosted model</strong> to reduce cost, cut latency, and keep user data private on-device. Ran user acceptance testing with iterative stakeholder feedback cycles before launch.',
    role: 'Lead developer — team of 4',
    stack: 'Swift, C++, OpenAI API, local LLM inference',
    year: '2024',
    links: [],
  },
  {
    num: '005',
    title: 'Naive Bayes Post Classifier',
    subtitle: 'Machine Learning · C++',
    tags: ['C++', 'ML', 'Naive Bayes', 'NLP'],
    desc: 'Naive Bayes classifier built from scratch in C++ to categorize Piazza forum posts by topic. Implements <strong>variant keyword identification</strong> to handle misspellings and morphological variants without a preprocessing library.',
    role: 'Solo — EECS 280 coursework, University of Michigan',
    stack: 'C++17',
    year: '2024',
    links: [],
  },
  {
    num: '006',
    title: 'Dubai Basketball League Site',
    subtitle: 'Web · PHP · MySQL',
    tags: ['PHP', 'MySQL', 'HTML', 'CSS', 'JavaScript'],
    desc: 'Dynamic stats site for the Dubai varsity basketball league, tracking <strong>200+ player profiles</strong> and reaching 500+ monthly viewers. Full CRUD backend in PHP and MySQL with JavaScript-driven filtering on the frontend. Engaged prospective corporate sponsors through stakeholder meetings.',
    role: 'Solo developer',
    stack: 'HTML, CSS, JavaScript, PHP, MySQL',
    year: '2020–2023',
    links: [],
  },
];

function render() {
  const wrap = document.getElementById('projects');
  PROJECTS.forEach((p, i) => {
    const section = document.createElement('div');
    section.className = 'project';
    section.innerHTML = `
      <div class="project-head" data-idx="${i}">
        <span class="proj-num">${p.num}</span>
        <div>
          <div class="proj-title">${p.title}</div>
          <div class="proj-subtitle">${p.subtitle}</div>
          <div class="proj-tags">${p.tags.map(t => '<span class="tag">'+t+'</span>').join('')}</div>
        </div>
        <span class="proj-arrow">&#9656;</span>
      </div>
      <div class="project-body">
        <div class="project-detail">
          <p class="detail-desc">${p.desc}</p>
          <dl class="detail-meta">
            <dt>Role</dt><dd>${p.role}</dd>
            <dt>Stack</dt><dd>${p.stack}</dd>
            <dt>Year</dt><dd>${p.year}</dd>
            ${p.links.length ? '<dt>Links</dt><dd><div class="detail-links">'+p.links.map(l=>'<a href="'+l.href+'" class="dlink" target="_blank">'+l.label+'</a>').join('')+'</div></dd>' : ''}
          </dl>
        </div>
      </div>`;
    section.querySelector('.project-head').addEventListener('click', () => {
      section.classList.toggle('open');
    });
    wrap.appendChild(section);
  });
}

// clock
const clk = document.getElementById('clock');
const tick = () => { clk.textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) + ' EST'; };
tick(); setInterval(tick, 30000);

render();
</script>
</body>
</html>

<style>
body{background:var(--bg);color:var(--fg);font-family:var(--body);font-size:17px;
  line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* page header */
.page-header{padding:clamp(48px,8vh,90px) clamp(20px,5vw,72px) clamp(28px,4vh,48px);border-bottom:1px solid var(--line)}
.ph-idx{font-family:var(--mono);font-size:.78rem;letter-spacing:.12em;color:var(--accent-ink);display:block;margin-bottom:14px}
.page-header h1{font-family:var(--disp);font-weight:440;font-size:clamp(2.6rem,7vw,5.2rem);line-height:.9;letter-spacing:-.03em;font-variation-settings:"opsz" 64}
.page-header h1 em{font-style:italic;color:var(--accent-ink)}
.page-header p{font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;color:var(--dim);margin-top:18px;max-width:52ch}

/* games grid */
.games-wrap{padding:clamp(36px,6vw,72px) clamp(20px,5vw,72px) 80px;display:flex;flex-direction:column;gap:clamp(48px,8vw,80px)}
.section-label{font-family:var(--mono);font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:clamp(16px,2.5vw,26px);display:flex;align-items:center;gap:14px}
.section-label::after{content:'';flex:1;height:1px;background:var(--line)}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:clamp(14px,2vw,22px)}
@media(max-width:580px){.games-grid{grid-template-columns:1fr}}

/* game card */
a.game-card{display:flex;flex-direction:column;text-decoration:none;
  background:var(--surface);border:1px solid var(--line);
  transition:transform .4s cubic-bezier(.2,.7,.3,1),border-color .4s,box-shadow .4s}
a.game-card:hover{transform:translateY(-8px);border-color:var(--line-strong);
  box-shadow:0 20px 40px -24px rgba(29,23,18,.35)}
a.game-card.coming-soon{opacity:.55;pointer-events:none}

/* card thumb */
.card-thumb{padding:clamp(20px,3vw,32px) clamp(16px,2.5vw,26px);
  display:grid;place-items:center;overflow:hidden;
  background:linear-gradient(135deg,#fbf3ea,#f0e1d0);
  border-bottom:1px solid var(--line)}
.card-thumb.has-img{padding:0;height:132px;display:block}
.thumb-img{width:100%;height:100%;object-fit:cover;display:block;
  transform:scale(1.08);transition:transform .55s cubic-bezier(.2,.7,.3,1)}
a.game-card:hover .thumb-img{transform:scale(1)}
.tiles{display:flex;gap:8px}
.t{width:clamp(36px,7vw,50px);aspect-ratio:1;display:grid;place-items:center;
  font-family:var(--disp);font-weight:700;font-size:clamp(1rem,2vw,1.2rem);
  color:var(--fg);border:1px solid var(--line-strong);border-radius:5px;
  background:#f3e8da;transition:transform .35s cubic-bezier(.2,.7,.3,1)}
.t.correct{background:var(--accent);color:var(--fg);border-color:var(--accent)}
.t.present{background:#dba93a;color:var(--fg);border-color:#dba93a}
.t.absent{background:#e6d8c8;color:var(--dim);border-color:transparent}
a.game-card:hover .tiles .t{transform:translateY(-6px)}
a.game-card:hover .tiles .t:nth-child(2){transition-delay:.05s}
a.game-card:hover .tiles .t:nth-child(3){transition-delay:.1s}
a.game-card:hover .tiles .t:nth-child(4){transition-delay:.15s}
a.game-card:hover .tiles .t:nth-child(5){transition-delay:.2s}

/* card body */
.card-body{padding:clamp(15px,2vw,20px);display:flex;flex-direction:column;gap:9px;flex:1}
.card-body h2{font-family:var(--disp);font-weight:520;font-size:clamp(1.15rem,1.8vw,1.4rem);
  letter-spacing:-.02em;line-height:1;font-variation-settings:"opsz" 40;transition:color .3s}
a.game-card:hover .card-body h2{color:var(--accent-ink)}
.card-body p{color:var(--dim);font-size:.84rem;font-weight:300;line-height:1.55;flex:1}
.card-foot{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-top:4px}
.stack{display:flex;gap:7px;flex-wrap:wrap}
.stack b{font-family:var(--mono);font-weight:500;font-size:.58rem;letter-spacing:.08em;
  text-transform:uppercase;color:var(--dim);border:1px solid var(--line-strong);
  padding:4px 9px;border-radius:30px}
.play-label{font-family:var(--mono);font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--accent-ink);display:inline-flex;gap:8px;align-items:center;white-space:nowrap}
.play-label .arr{transition:transform .3s}
a.game-card:hover .play-label .arr{transform:translateX(5px)}
.soon-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--dimmer)}

/* multiplayer hub */
/* link card through to the server page */
.srv-card{display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  background:var(--surface);border:1px solid var(--line);border-radius:14px;
  padding:20px 22px;text-decoration:none;color:inherit;transition:border-color .25s,transform .25s}
.srv-card:hover{border-color:var(--accent-ink);transform:translateY(-2px)}
.srv-card .srv-txt{flex:1;min-width:200px}
.srv-card h3{font-family:var(--disp);font-weight:560;font-size:1.35rem;margin:0 0 4px}
.srv-card p{color:var(--dim);font-size:.9rem;font-weight:300;margin:0}
.srv-card .srv-live{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--accent-ink);border:1px solid var(--accent-ink);border-radius:30px;padding:7px 13px;flex-shrink:0}
.mp-actions{display:flex;gap:10px;margin-top:2px}
.mp-actions a{flex:1;text-align:center;text-decoration:none;font-family:var(--mono);font-size:.66rem;
  letter-spacing:.1em;text-transform:uppercase;padding:10px;border-radius:8px;border:1px solid var(--line-strong);
  color:var(--fg);transition:.2s}
.mp-actions a.host{background:var(--accent-ink);color:#fff;border-color:var(--accent-ink)}
.mp-actions a:hover{filter:brightness(1.08);transform:translateY(-2px)}
</style>
</head>
<body class="noise">

<div class="status">
  <a href="../index.html" class="sig">Joshua Gustaveson</a>
  <nav>
    <a href="../code.html">Code</a>
    <a href="index.html" class="active">Games</a>
    <a href="../gallery.html">Photography</a>
    <a href="../colormap.html">Color Space</a>
  </nav>
  <span id="clock">--:-- EST</span>
</div>

<div class="page-header">
  <span class="ph-idx">02 / Games</span>
  <h1>Built for <em>fun</em></h1>
  <p>Little web based interactive games.</p>
</div>

<div class="games-wrap">
  <a class="srv-card" href="server.html">
    <div class="srv-txt">
      <h3>Game server</h3>
      <p>Browse every open game and join one — or host your own.</p>
    </div>
    <span class="srv-live" id="srv-live">Open games &rarr;</span>
  </a>
  <div>
    <div class="section-label">Games</div>
    <div class="games-grid" id="games-grid"></div>
  </div>
  <div>
    <div class="section-label">Solvers</div>
    <div class="games-grid" id="solvers-grid"></div>
  </div>
  <div>
    <div class="section-label">Game Components</div>
    <div class="games-grid" id="components-grid"></div>
  </div>
</div>

<script>
  try {
    var clk = document.getElementById('clock');
    var tick = function(){
      clk.textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) + ' EST';
    };
    tick(); setInterval(tick, 30000);
  } catch(e){}
</script>
<script type="module">
import { CARDS } from '../data/games.js';

function renderCards(target, items) {
  items.forEach(g => {
    const stack = g.stack.map(s => `<b>${s}</b>`).join('');
    const cs = g.comingSoon ? ' coming-soon' : '';
    const cta = g.comingSoon
      ? `<span class="soon-label">${g.ctaShort}</span>`
      : `<span class="play-label">${g.ctaShort} <span class="arr">&#x2192;</span></span>`;
    target.insertAdjacentHTML('beforeend', `
      <a class="game-card${cs}" href="${g.comingSoon ? '#' : g.href}">
        ${g.thumbImg
          ? `<div class="card-thumb has-img" style="min-height:112px"><img class="thumb-img" src="../${g.thumbImg}" alt="${g.title} cover"></div>`
          : `<div class="card-thumb" style="background:${g.thumbBg};min-height:112px">${g.thumbSvg}</div>`}
        <div class="card-body">
          <h2>${g.title}</h2>
          <p>${g.descFull}</p>
          ${g.credit ? `<p style="font-family:var(--mono);font-size:.58rem;letter-spacing:.06em;color:var(--dimmer);margin-top:6px">${g.credit.replace(/<[^>]+>/g,'')}</p>` : ''}
          <div class="card-foot">
            <div class="stack">${stack}</div>
            ${cta}
          </div>
        </div>
      </a>`);
  });
}

const games      = CARDS.filter(g => g.type === 'game' && !g.category);
const solvers    = CARDS.filter(g => g.type === 'game' && g.category === 'solver');
const components = CARDS.filter(g => g.type === 'game' && g.category === 'component');
const grid      = document.getElementById('games-grid');
const solversGrid = document.getElementById('solvers-grid');
const compGrid  = document.getElementById('components-grid');
if (grid)        renderCards(grid, games);
if (solversGrid) renderCards(solversGrid, solvers);
if (compGrid)    renderCards(compGrid, components);

// The server browser lives on its own page (games/server.html); here we only
// show how many games are open right now, so the card is worth clicking.
(async () => {
  const badge = document.getElementById('srv-live');
  if (!badge) return;
  try {
    const { listLobbies } = await import('./net/p2p.js');
    const n = (await listLobbies()).length;
    badge.textContent = n ? `${n} open game${n === 1 ? '' : 's'} \u2192` : 'No open games \u2192';
  } catch { /* leave the default label */ }
})();
</script>
</body>

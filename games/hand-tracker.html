<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Tracker — PoC</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0a0908;
    --surface:    #111009;
    --fg:         #ede5da;
    --dim:        #6e6358;
    --dimmer:     #3d3730;
    --accent:     #ccf73f;
    --accent-ink: #8ab020;
    --line:       rgba(237,229,218,.08);
    --line-mid:   rgba(237,229,218,.14);
    --mono:       "IBM Plex Mono", ui-monospace, monospace;
    --red:        #e06060;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--mono);
    font-size: 13px;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── status bar ─────────────────────────────────────────────── */
  #bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    background: rgba(10,9,8,.9);
    backdrop-filter: blur(6px);
    z-index: 10;
  }
  #bar .tag {
    font-size: .62rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--accent);
  }
  #status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--dimmer);
    flex-shrink: 0;
    transition: background .4s;
  }
  #status-dot.ready   { background: var(--accent); animation: pulse 2.4s infinite; }
  #status-dot.error   { background: var(--red); }
  #status-dot.loading { background: #4a8fbf; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
  #status-msg { font-size: .64rem; color: var(--dim); }
  #fps { margin-left: auto; font-size: .62rem; color: var(--dimmer); }
  #back-link {
    font-size: .62rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--dim);
    text-decoration: none;
    transition: color .2s;
  }
  #back-link:hover { color: var(--fg); }

  /* ── main split ─────────────────────────────────────────────── */
  #main {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── camera pane ─────────────────────────────────────────────── */
  #cam-wrap {
    flex: 1;
    position: relative;
    background: #000;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    transform: scaleX(-1); /* mirror so it feels natural */
  }
  #overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #error-overlay {
    display: none;
    position: absolute;
    inset: 0;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--dim);
    font-size: .78rem;
    line-height: 1.6;
    text-align: center;
    padding: 40px;
    background: rgba(10,9,8,.85);
  }
  #error-overlay .code { color: var(--red); font-size: .82rem; }

  /* ── side panel ─────────────────────────────────────────────── */
  #panel {
    width: 234px;
    flex-shrink: 0;
    border-left: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .p-section {
    padding: 18px 16px;
    border-bottom: 1px solid var(--line);
  }
  .p-label {
    font-size: .58rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--dimmer);
    margin-bottom: 12px;
  }

  /* hand count */
  #hand-count { font-size: 2.8rem; font-weight: 600; color: var(--accent); line-height: 1; }
  #hand-sub   { font-size: .58rem; letter-spacing: .14em; text-transform: uppercase; color: var(--dim); margin-top: 2px; }

  /* fingertip rows */
  #fingertip-list { flex: 1; overflow-y: auto; padding: 0 16px; }
  .tip-row {
    display: grid;
    grid-template-columns: 60px 1fr;
    align-items: baseline;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
  }
  .tip-row:last-child { border-bottom: none; }
  .tip-name { font-size: .65rem; color: var(--dim); }
  .tip-xy   { font-size: .64rem; color: var(--accent); font-feature-settings: "tnum"; }
  .tip-row.inactive .tip-name,
  .tip-row.inactive .tip-xy { color: var(--dimmer); }

  /* model tag */
  #model-tag {
    display: inline-block;
    font-size: .6rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--accent-ink);
    border: 1px solid var(--accent-ink);
    padding: 4px 9px;
    margin-bottom: 10px;
  }
  .model-note {
    font-size: .58rem;
    color: var(--dimmer);
    line-height: 1.7;
  }
  .model-note code { color: var(--dim); }

  @media (max-width: 680px) {
    #panel { display: none; }
  }
</style>
</head>
<body>

<!-- status bar -->
<div id="bar">
  <a id="back-link" href="../index.html">← Index</a>
  <span class="tag">Hand Tracker</span>
  <div id="status-dot"></div>
  <span id="status-msg">Initializing…</span>
  <span id="fps">— fps</span>
</div>

<!-- main -->
<div id="main">

  <div id="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="error-overlay">
      <span class="code" id="error-code">Camera access denied</span>
      <span id="error-detail">Allow camera permission and reload the page.</span>
    </div>
  </div>

  <div id="panel">
    <div class="p-section">
      <div class="p-label">Hands in frame</div>
      <div id="hand-count">0</div>
      <div id="hand-sub">detected</div>
    </div>

    <div class="p-section">
      <div class="p-label">Fingertip positions (0 – 1)</div>
    </div>
    <div id="fingertip-list"></div>

    <div class="p-section" style="margin-top:auto">
      <div class="p-label">Active model</div>
      <div id="model-tag">MediaPipe Hands</div>
      <div class="model-note">
        Swap <code>activeModel</code> for <code>CustomModel</code><br>
        to use your own trained weights.<br>
        Interface: <code>init · detect · destroy</code>
      </div>
    </div>
  </div>

</div>

<script type="module">
// ═══════════════════════════════════════════════════════════════════════
//  MODEL INTERFACE — contract every hand model must satisfy
//
//  init()                          → Promise<void>
//    Load weights / WASM / warm up GPU. Called once before detect().
//
//  detect(videoEl, timestampMs)    → Hand[]
//    Run inference on the current video frame. Must be called in a
//    requestAnimationFrame loop for VIDEO running mode.
//
//  destroy()                       → void
//    Release resources (GPU tensors, WASM memory, etc.)
//
//  Hand = {
//    landmarks:  Array<{x, y, z}> (length 21, normalized 0–1)
//    handedness: 'Left' | 'Right'
//    score:      number (0–1)
//  }
//
//  Landmark layout:
//    0          Wrist
//    1–4        Thumb    (CMC → Tip)
//    5–8        Index    (MCP → Tip)
//    9–12       Middle   (MCP → Tip)
//    13–16      Ring     (MCP → Tip)
//    17–20      Pinky    (MCP → Tip)
//  Fingertips:  4, 8, 12, 16, 20
// ═══════════════════════════════════════════════════════════════════════


// ── MediaPipe implementation ────────────────────────────────────────
class MediaPipeModel {
  constructor() { this._det = null; }

  async init() {
    const { HandLandmarker, FilesetResolver } = await import(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs'
    );
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    this._det = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
        delegate: 'GPU',
      },
      numHands:                     2,
      runningMode:                  'VIDEO',
      minHandDetectionConfidence:   0.5,
      minHandPresenceConfidence:    0.5,
      minTrackingConfidence:        0.5,
    });
  }

  detect(videoEl, timestampMs) {
    if (!this._det) return [];
    const r = this._det.detectForVideo(videoEl, timestampMs);
    return (r.landmarks || []).map((lms, i) => ({
      landmarks:  lms,
      handedness: r.handednesses?.[i]?.[0]?.displayName ?? 'Unknown',
      score:      r.handednesses?.[i]?.[0]?.score        ?? 1,
    }));
  }

  destroy() { this._det?.close(); this._det = null; }
}


// ── Stub for your future custom-trained model ───────────────────────
class CustomModel {
  async init()        { throw new Error('CustomModel: not implemented yet'); }
  detect(_v, _t)      { return []; }
  destroy()           {}
}


// ── SWAP THIS LINE to change the active implementation ──────────────
const activeModel = new MediaPipeModel();
// const activeModel = new CustomModel();


// ═══════════════════════════════════════════════════════════════════════
//  HandTracker — model-agnostic detection loop
// ═══════════════════════════════════════════════════════════════════════
class HandTracker {
  constructor(model) {
    this.model   = model;
    this._raf    = null;
    this._active = false;
  }

  // Calls onFrame(Hand[]) every animation frame once the model is ready.
  async start(videoEl, onFrame) {
    await this.model.init();
    this._active = true;
    const loop = () => {
      if (!this._active) return;
      if (videoEl.readyState >= HTMLMediaElement.HAVE_CURRENT_DATA) {
        onFrame(this.model.detect(videoEl, performance.now()));
      }
      this._raf = requestAnimationFrame(loop);
    };
    this._raf = requestAnimationFrame(loop);
  }

  stop() {
    this._active = false;
    if (this._raf) cancelAnimationFrame(this._raf);
    this.model.destroy();
  }
}


// ═══════════════════════════════════════════════════════════════════════
//  HandRenderer — draws skeleton + landmarks on a canvas overlay
// ═══════════════════════════════════════════════════════════════════════
const CONNECTIONS = [
  // Thumb
  [0,1],[1,2],[2,3],[3,4],
  // Index
  [0,5],[5,6],[6,7],[7,8],
  // Middle
  [0,9],[9,10],[10,11],[11,12],
  // Ring
  [0,13],[13,14],[14,15],[15,16],
  // Pinky
  [0,17],[17,18],[18,19],[19,20],
  // Palm arch
  [5,9],[9,13],[13,17],[0,17],
];

const FINGERTIP_IDX   = [4, 8, 12, 16, 20];
const FINGERTIP_NAMES = ['Thumb', 'Index', 'Middle', 'Ring', 'Pinky'];

// Per-hand accent colors (for multi-hand)
const HAND_COLORS = ['#ccf73f', '#3fc8f7'];

class HandRenderer {
  constructor(canvas, videoEl) {
    this.canvas   = canvas;
    this.ctx      = canvas.getContext('2d');
    this.videoEl  = videoEl;
    this.mirror   = true; // flip X to match CSS scaleX(-1) on the video
  }

  // Map a normalized landmark to canvas pixel, accounting for
  // the letterboxing/pillarboxing of object-fit:contain.
  _videoRect() {
    const vW = this.videoEl.videoWidth  || this.canvas.width;
    const vH = this.videoEl.videoHeight || this.canvas.height;
    const cW = this.canvas.width;
    const cH = this.canvas.height;
    const vAR = vW / vH;
    const cAR = cW / cH;
    let dW, dH, dX, dY;
    if (vAR > cAR) {          // letterboxed (bars top/bottom)
      dW = cW; dH = cW / vAR;
      dX = 0;  dY = (cH - dH) / 2;
    } else {                  // pillarboxed (bars left/right)
      dH = cH; dW = cH * vAR;
      dY = 0;  dX = (cW - dW) / 2;
    }
    return { x: dX, y: dY, w: dW, h: dH };
  }

  _pt(lm, rect) {
    const x = this.mirror
      ? rect.x + (1 - lm.x) * rect.w
      : rect.x +       lm.x  * rect.w;
    const y = rect.y + lm.y * rect.h;
    return [x, y];
  }

  render(hands) {
    const { canvas, ctx } = this;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!hands.length) return;

    const rect = this._videoRect();

    hands.forEach((hand, hi) => {
      const lms   = hand.landmarks;
      const color = HAND_COLORS[hi % HAND_COLORS.length];

      // Skeleton
      ctx.lineWidth   = 1.6;
      ctx.strokeStyle = 'rgba(200,228,255,0.40)';
      ctx.beginPath();
      for (const [a, b] of CONNECTIONS) {
        const [ax, ay] = this._pt(lms[a], rect);
        const [bx, by] = this._pt(lms[b], rect);
        ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
      }
      ctx.stroke();

      // Joint dots (non-fingertip)
      for (let i = 0; i < 21; i++) {
        if (FINGERTIP_IDX.includes(i)) continue;
        const [x, y] = this._pt(lms[i], rect);
        ctx.beginPath();
        ctx.arc(x, y, i === 0 ? 5.5 : 2.8, 0, Math.PI * 2);
        ctx.fillStyle = i === 0 ? 'rgba(255,255,255,0.55)' : 'rgba(200,228,255,0.55)';
        ctx.fill();
      }

      // Fingertips
      FINGERTIP_IDX.forEach((idx, fi) => {
        const lm    = lms[idx];
        const [x, y] = this._pt(lm, rect);

        // Glow
        ctx.beginPath();
        ctx.arc(x, y, 13, 0, Math.PI * 2);
        ctx.fillStyle = color.replace(')', ', 0.12)').replace('rgb(', 'rgba(').replace('#', '') ;
        // simpler inline glow:
        const grd = ctx.createRadialGradient(x, y, 0, x, y, 13);
        grd.addColorStop(0, hexAlpha(color, 0.25));
        grd.addColorStop(1, hexAlpha(color, 0));
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(x, y, 13, 0, Math.PI * 2); ctx.fill();

        // Solid dot
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();

        // Label
        const lx = x + 12, ly = y - 4;
        ctx.font = '500 9.5px "IBM Plex Mono", monospace';
        const nameStr = FINGERTIP_NAMES[fi];
        const xyStr   = `${lm.x.toFixed(3)}  ${lm.y.toFixed(3)}`;
        [[nameStr, hexAlpha(color, 0.9)], [xyStr, 'rgba(210,232,255,0.72)']].forEach(([str, clr], li) => {
          ctx.fillStyle = 'rgba(0,0,0,0.65)';
          ctx.fillText(str, lx + 1, ly + li * 12 + 1);
          ctx.fillStyle = clr;
          ctx.fillText(str, lx, ly + li * 12);
        });
      });
    });
  }
}

// hex color → rgba string
function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}


// ═══════════════════════════════════════════════════════════════════════
//  App
// ═══════════════════════════════════════════════════════════════════════
async function main() {
  const videoEl    = document.getElementById('video');
  const overlayEl  = document.getElementById('overlay');
  const camWrap    = document.getElementById('cam-wrap');
  const statusDot  = document.getElementById('status-dot');
  const statusMsg  = document.getElementById('status-msg');
  const fpsEl      = document.getElementById('fps');
  const handCount  = document.getElementById('hand-count');
  const tipList    = document.getElementById('fingertip-list');
  const errorOv    = document.getElementById('error-overlay');
  const errorCode  = document.getElementById('error-code');
  const errorDetail= document.getElementById('error-detail');

  function setStatus(state, msg) {
    statusDot.className = state; // 'loading' | 'ready' | 'error' | ''
    statusMsg.textContent = msg;
  }

  // Resize overlay to match container
  const ro = new ResizeObserver(() => {
    overlayEl.width  = camWrap.clientWidth;
    overlayEl.height = camWrap.clientHeight;
  });
  ro.observe(camWrap);
  overlayEl.width  = camWrap.clientWidth;
  overlayEl.height = camWrap.clientHeight;

  // Camera
  setStatus('loading', 'Requesting camera…');
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
    });
    videoEl.srcObject = stream;
    await new Promise(res => { videoEl.onloadedmetadata = res; });
    await videoEl.play();
  } catch (err) {
    setStatus('error', 'Camera unavailable');
    errorCode.textContent  = 'Camera access denied';
    errorDetail.textContent= `${err.message} — allow camera permission and reload.`;
    errorOv.style.display  = 'flex';
    return;
  }

  // Model
  setStatus('loading', 'Loading model…');
  const tracker  = new HandTracker(activeModel);
  const renderer = new HandRenderer(overlayEl, videoEl);

  // FPS
  let frames = 0, lastFpsTs = performance.now();

  // Tip rows (built once, updated in place)
  const NAMES = FINGERTIP_NAMES;
  tipList.innerHTML = NAMES.map(n =>
    `<div class="tip-row inactive" id="tip-${n}">
       <span class="tip-name">${n}</span>
       <span class="tip-xy">—</span>
     </div>`
  ).join('');
  const tipRows = Object.fromEntries(NAMES.map(n => [n, tipList.querySelector(`#tip-${n}`)]));

  function updatePanel(hands) {
    handCount.textContent = hands.length;
    const lms = hands[0]?.landmarks;
    FINGERTIP_IDX.forEach((idx, fi) => {
      const row = tipRows[NAMES[fi]];
      if (!lms) {
        row.className = 'tip-row inactive';
        row.querySelector('.tip-xy').textContent = '—';
      } else {
        const lm = lms[idx];
        row.className = 'tip-row';
        row.querySelector('.tip-xy').textContent =
          `${lm.x.toFixed(3)}  ${lm.y.toFixed(3)}`;
      }
    });
  }

  try {
    await tracker.start(videoEl, (hands) => {
      // FPS counter
      frames++;
      const now = performance.now();
      if (now - lastFpsTs >= 1000) {
        fpsEl.textContent = frames + ' fps';
        frames = 0; lastFpsTs = now;
      }

      renderer.render(hands);
      updatePanel(hands);
      if (statusMsg.textContent !== 'Running') setStatus('ready', 'Running');
    });
  } catch (err) {
    setStatus('error', `Model error: ${err.message}`);
    console.error(err);
  }
}

main();
</script>
</body>
</html>
